name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Smoke test - validate scenario
        run: uv run scenetrace validate examples/basic_scenario.yaml

      - name: Smoke test - run scenario
        run: uv run scenetrace run examples/basic_scenario.yaml --provider mock -o traces/result.json

      - name: Smoke test - generate report
        if: always()
        run: uv run scenetrace report traces/result.json -o traces/report.html

      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenetrace-traces-${{ matrix.python-version }}
          path: traces/
          retention-days: 14
