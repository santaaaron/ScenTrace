name: ScenTrace Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ScenTrace
        run: pip install .

      - name: Validate scenarios
        run: scenetrace validate .scenetrace/example_scenario.yaml

      - name: Run scenarios (mock provider)
        run: scenetrace run .scenetrace/example_scenario.yaml --provider mock -o traces/result.json

      - name: Generate report
        if: always()
        run: scenetrace report traces/result.json -o traces/report.html

      - name: Upload trace artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scenetrace-traces
          path: traces/
          retention-days: 14
